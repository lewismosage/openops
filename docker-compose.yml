services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - openops_data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/openops.db
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    profiles:
      - full

volumes:
  openops_data:
