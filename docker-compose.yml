services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - openops_data:/app/openops.db
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./openops.db
      - CORS_ORIGINS=http://localhost:3000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  openops_data:
